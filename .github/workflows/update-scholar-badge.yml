name: Update Scholar Badge

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-scholar-badge.yml"
      - "scripts/update_scholar_badge.py"
      - "google-scholar-stats/gs_data_shieldsio.json"

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update badge data
        run: python scripts/update_scholar_badge.py

      - name: Commit updated badge data
        run: |
          if git diff --quiet -- google-scholar-stats/gs_data_shieldsio.json; then
            echo "No badge changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add google-scholar-stats/gs_data_shieldsio.json
          git commit -m "chore: update scholar badge"
          git push
